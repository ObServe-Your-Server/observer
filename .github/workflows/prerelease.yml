name: Prerelease

on:
  push:
    tags:
      - "v*-*"

jobs:
  test:
    name: Run tests
    runs-on: [observer-self-hosted]
    container: rust:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run tests
        run: cargo test --workspace

  build:
    name: Build and publish prerelease
    needs: test
    runs-on: [observer-self-hosted]
    container: rust:latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: apt-get update && apt-get install -y musl-tools pkg-config python3-pip && pip3 install ziglang --break-system-packages

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild

      - name: Add targets
        run: |
          rustup target add x86_64-unknown-linux-musl
          rustup target add aarch64-unknown-linux-musl

      - name: Build x86_64 binary
        run: cargo zigbuild --release --bin observer --target x86_64-unknown-linux-musl

      - name: Build aarch64 binary (Raspberry Pi 3/4/5, 64-bit)
        run: cargo zigbuild --release --bin observer --target aarch64-unknown-linux-musl

      - name: Rename binaries with arch suffix
        run: |
          cp target/x86_64-unknown-linux-musl/release/observer target/observer-x86_64
          cp target/aarch64-unknown-linux-musl/release/observer target/observer-aarch64

      - name: Create GitHub Prerelease
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          files: |
            target/observer-x86_64
            target/observer-aarch64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
