name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: [observer-self-hosted]
    permissions:
      contents: write   # needed to create the release and upload the binary
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # musl is an alternative C standard library that gets statically linked
          # into the binary — meaning the binary has zero external dependencies
          # and runs on any Linux machine regardless of distro or libc version.
          targets: x86_64-unknown-linux-musl

      - name: Install build dependencies
        # Installs gcc, the standard C build toolchain, and musl-tools in one step.
        # build-essential provides the cc linker Rust needs, musl-tools provides
        # the musl-specific compiler for the static target.
        run: sudo apt-get update && sudo apt-get install -y build-essential musl-tools

      - name: Build static binary
        # --target tells Cargo to compile for musl instead of the default glibc.
        # The resulting binary in target/x86_64-unknown-linux-musl/release/
        # is fully self-contained and can be copied and run on any Linux server.
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/x86_64-unknown-linux-musl/release/observer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
