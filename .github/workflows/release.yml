name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    name: Run tests
    runs-on: [observer-self-hosted]
    container: rust:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run tests
        run: cargo test

  build:
    name: Build and publish release
    needs: test  # only runs if tests pass
    runs-on: [observer-self-hosted]
    container: rust:latest
    permissions:
      contents: write  # required to create the release and upload the binary
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install musl tools
        # musl links the C library statically so the binary runs on any Linux without dependencies
        run: apt-get update && apt-get install -y musl-tools

      - name: Add musl target
        # adds the musl compile target to rustup
        run: rustup target add x86_64-unknown-linux-musl

      - name: Build static binary
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/x86_64-unknown-linux-musl/release/observer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
