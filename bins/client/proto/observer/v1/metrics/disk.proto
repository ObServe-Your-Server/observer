syntax = "proto3";

package observer.v1.metrics;

import "google/protobuf/timestamp.proto";

// A single collection pass, covering every disk observed on the host at that time.
message DiskEntry {
  repeated DiskMetrics disks = 1;
  google.protobuf.Timestamp collected_at = 2;
}

message DiskMetrics {
  string name = 1;
  uint64 total_bytes = 2;
  uint64 used_bytes = 3;
  uint64 available_bytes = 4;
  uint64 used_blocks = 5;
  uint64 available_blocks = 6;
  uint64 block_size = 7;
  google.protobuf.Timestamp collected_at = 8;
}